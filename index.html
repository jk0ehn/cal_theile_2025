<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veranstaltungskalender</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
      }

      body {
        font-family: 'Titillium Web', sans-serif;
        margin: 0;
        color: #333;
      }
      h1 {
        text-align: center;
        font-weight: 600;
        color: #444;
        margin-bottom: 30px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 0 auto;
        background-color: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      thead {
        background-color: #058c56;
        color: #fff;
      }
      th,
      td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #f7f9fa;
      }
      tbody tr:nth-child(odd) {
        background-color: #f7f9fa;
      }
      td {
        vertical-align: top;
      }
      .highlight {
        font-weight: 600;
        color: #058c56;
      }
    </style>
  </head>
  <body>
    <h1>2026</h1>
    <table>
      <thead>
        <tr>
          <th>Datum</th>
          <th>Veranstaltung</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="highlight">03.03.2026</td>
          <td>Anwenderschulung Trockenbau</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
